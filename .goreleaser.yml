builds:
  -
    id: "zdash"
    binary: zdash
    main: main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - freebsd
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  -
    id: zdash
    name_template: "zdash-{{ .Os }}_{{ .Arch }}_{{ .Version }}"
    files:
      - LICENSE
      - README.md
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
nfpms:
  -
    file_name_template: "zdash_package_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: Michael Paepcke
    homepage: https://paepcke.de/zdash
    maintainer: Michael Paepcke <git@paepcke.de>
    description: zdash
    license: BSD 3-Clause
    formats:
      - deb
      - rpm
